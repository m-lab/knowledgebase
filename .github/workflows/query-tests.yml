name: Validate BigQuery examples

# Dry-run validates every <!-- sqltest -->-decorated ```sql block in
# src/content/articles/ against live BigQuery schemas (free — no data scanned).
#
# Authenticates via Workload Identity Federation — no long-lived keys or
# repository secrets. The GitHub OIDC token is exchanged for credentials of
# the kb-query-tests service account in the measurement-lab project.
# Fork PRs cannot mint OIDC tokens, so the job skips for them.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/content/articles/**'
      - 'scripts/test-queries.js'
      - '.github/workflows/query-tests.yml'

permissions:
  id-token: write
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    # id-token: write is not granted to pull_request runs from forks —
    # skip rather than fail.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: measurement-lab
          workload_identity_provider: projects/808951263862/locations/global/workloadIdentityPools/github/providers/m-lab-repos
          service_account: kb-query-tests@measurement-lab.iam.gserviceaccount.com
          token_format: access_token

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Dry-run decorated queries
        run: node scripts/test-queries.js
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
