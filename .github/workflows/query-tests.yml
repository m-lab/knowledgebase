name: Validate BigQuery examples

# Dry-run validates every <!-- sqltest -->-decorated ```sql block in
# src/content/articles/ against live BigQuery schemas (free — no data scanned).
#
# Requires a repository secret GCP_SA_KEY containing a service-account JSON
# key with the "BigQuery Job User" role. Without the secret (e.g. fork PRs),
# the job skips rather than failing.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/content/articles/**'
      - 'scripts/test-queries.js'
      - '.github/workflows/query-tests.yml'

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for GCP credentials
        id: creds
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GCP_SA_KEY secret not available — skipping query validation."
          fi

      - name: Authenticate to Google Cloud
        if: steps.creds.outputs.available == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Node
        if: steps.creds.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Dry-run decorated queries
        if: steps.creds.outputs.available == 'true'
        run: node scripts/test-queries.js
